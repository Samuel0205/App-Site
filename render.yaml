# Render Blueprint — deploys this folder as a free Static Site.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: truckloyal-site
    runtime: static
    buildCommand: ""        # nothing to build — it's a single static HTML page
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
